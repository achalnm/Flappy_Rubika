<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Rubika</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="game-container">
  <div id="bg-far"></div>
  <canvas id="starCanvas" width="2400" height="600"></canvas>
  <div id="bg-layer"></div>
  <div id="bg-mid"></div>
  <div id="white-out"></div>
  <div id="vignette"></div>

  <div id="ui">
    <div class="menu-box" id="menu-content">
      <span class="menu-emoji" id="ui-emoji">🐶</span>
      <h1 id="ui-title">Flappy Rubika</h1>
      <p id="ui-desc">You better be playing this on your laptop<br><em>Reach the end!!</em></p>
      <div class="btn-container" id="ui-btns">
        <button onclick="startGame()">LesGOOOO 🚀</button>
      </div>
      <div class="hint-row" id="ui-hints">
        <span class="hint-pill">SPACE to flap</span>
        <span class="hint-pill">Chicken and Banana = Slower</span>
        <span class="hint-pill">BATH, YUCK! = Faster</span>
        <span class="hint-pill">2 Lives</span>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas" width="1200" height="800"></canvas>
</div>

<script src="js/config.js"></script>
<script src="js/assets.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/physics.js"></script>
<script src="js/powerups.js"></script>
<script src="js/renderer.js"></script>
<script src="js/score.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
